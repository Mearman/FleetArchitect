name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; queue new runs behind an in-progress one
# rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # Persist the deterministic battle-result disk cache (`.cache/sim/`) so
      # the heavy integration suites (306-matchup faction matrix, showcase
      # presets) reuse prior runs instead of re-simulating every battle. The key
      # includes the engine source and the algorithm-signature module, so the
      # cache rebuilds when the engine changes; the key self-invalidates on a
      # real algorithm change via the pinned-frame-hash signature baked into
      # every cache key.
      - name: Cache battle results
        uses: actions/cache@v4
        with:
          path: .cache/sim
          key: sim-cache-${{ runner.os }}-node26-${{ hashFiles('src/domain/simulation/**/*.ts', 'src/domain/cache/algorithm-signature.ts') }}
      # Serial: the heavy SI-scale battles (lethality guards, preset-pair
      # determinism) contend under vitest's default file-parallelism and time
      # out, flaking the gate. The determinism test tolerates cross-architecture
      # floating-point differences (its pins are platform-specific) by falling
      # back to a within-platform byte-identical check.
      - run: pnpm test --no-file-parallelism

  release:
    name: Release
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v7
        with:
          # semantic-release analyses the full commit history since the last release.
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-deploy:
    name: Build and deploy to Pages
    # Depends on quality only (not release): semantic-release fails when main is
    # branch-protected (GITHUB_TOKEN can't push tags to main), and the site
    # should deploy regardless. The top-bar link falls back to the commit hash
    # when no release tag exists.
    needs: quality
    runs-on: ubuntu-latest
    # `actions: write` (beyond the top-level set) lets the artifact-cleanup
    # step below delete a `github-pages` artifact left by a prior failed
    # attempt, so re-running this job never collides with a stale upload.
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags so the build can resolve the release tag.
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # Compute the version semantic-release will cut (dry-run: no tag, no
      # commit, no write perms needed) and expose it to the build as
      # NEXT_RELEASE_TAG, so the deployed top-bar shows the version rather than
      # the un-tagged commit hash. Empty for non-releasing commits (test/chore).
      - name: Compute next release tag (dry-run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "NEXT_RELEASE_TAG=$(node scripts/next-version.mjs)" >> "$GITHUB_ENV"
      - run: pnpm build
      - uses: actions/configure-pages@v6
      # A failed `deploy-pages` step (GitHub Pages' "Deployment failed, try
      # again later" transient) leaves this run's uploaded `github-pages`
      # artifact behind. Re-running the job then uploads a second one and
      # `deploy-pages` refuses both ("Multiple artifacts named github-pages ...
      # count is 2"). Drop any prior attempt's artifact before uploading so
      # reruns are clean. No-op on the first attempt (nothing to delete).
      - name: Remove prior github-pages artifacts from this run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name=="github-pages") | .id' |
            while read -r id; do
              [ -z "$id" ] && continue
              echo "Removing stale github-pages artifact $id from a prior attempt"
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
            done
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
